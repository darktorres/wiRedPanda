name: Build CMake (Ninja)

on:
  push:
    branches-ignore:
      - master
      - wasm

  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

jobs:
  build_cmake:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        qt_version: [5.12.12, 5.13.2, 5.14.2, 5.15.2, 6.2.4, 6.3.2, 6.4.3, 6.5.3, 6.6.3, 6.7.3, 6.8.3, 6.9.0]

    runs-on: ${{ matrix.os }}
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install Qt5
      if: startsWith(matrix.qt_version, '5')
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ matrix.qt_version }}
        cache: true
        aqtversion: ==3.2.*

    - name: Install CUPS dependency for Qt 6.7.*
      if: matrix.os == 'ubuntu-latest' && startsWith(matrix.qt_version, '6.7')
      run: sudo apt update && sudo apt install -y libcups2-dev

    - name: Install Qt6
      if: startsWith(matrix.qt_version, '6')
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ matrix.qt_version }}
        modules: qtmultimedia qtimageformats
        cache: true
        aqtversion: ==3.2.*

    - name: Install Ninja on Linux
      if: runner.os == 'Linux'
      run: sudo apt update && sudo apt install -y ninja-build

    - name: Install Ninja on Windows
      if: runner.os == 'Windows'
      run: choco install ninja -y

    - name: Install Ninja on macOS
      if: runner.os == 'macOS'
      run: brew install ninja

    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ matrix.os }}-${{ matrix.qt_version }}

    - name: Setup MSVC Toolchain
      if: runner.os == 'Windows'
      uses: pbeast/gha-setup-vsdevenv@master

    - name: Build (Ninja)
      run: |
        cmake -S . -B build -G Ninja `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="$QT_INSTALL_PATH"
        cmake --build build

    - name: Test (Linux)
      if: runner.os == 'Linux'
      run: ./build/test -platform offscreen

    - name: Test (Windows)
      if: runner.os == 'Windows'
      run: ./build/test.exe

    - name: Test (macOS)
      if: runner.os == 'macOS'
      run: ./build/test
