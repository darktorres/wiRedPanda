name: Deploy

on:
  release:
    types: [published]

jobs:
  # ================================================================================
  # == Build Job for Linux (Ubuntu 20.04 in Docker)                               ==
  # ================================================================================
  build-linux-docker:
    name: Build Linux (Ubuntu 20.04 Docker) Qt ${{ matrix.qt }}
    runs-on: ubuntu-latest # Host for the Docker container
    container:
      image: ubuntu:20.04 # Using Ubuntu 20.04
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        qt: [5.15.2, 6.9.0]

    steps:
    # ++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
    # ++ Install Git (standard package from Ubuntu 20.04) ++
    # ++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
    - name: Install Git
      shell: bash
      run: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get update -qq
        apt-get install -y --no-install-recommends git ca-certificates
        apt-get install -y --no-install-recommends software-properties-common
        add-apt-repository ppa:deadsnakes/ppa -y
        apt-get update -qq
        apt-get install -y python3.10 python3.10-distutils python3.10-venv # ensure venv and distutils are there
        update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.8 1
        update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.10 2

    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Extract Version
      run: echo "VERSION=$(echo $GITHUB_REF | sed 's|refs/tags/||')" >> $GITHUB_ENV
      shell: bash

    # Combined dependency installation step
    - name: Install Dependencies (Linux in Docker)
      shell: bash
      run: |
        export DEBIAN_FRONTEND=noninteractive
        # apt-get update -qq # Already done above
        apt-get install -y --no-install-recommends \
          curl \
          python3 python3-pip python3-venv wget \
          ccache \
          libgl1-mesa-dev \
          libcurl4-openssl-dev cmake make g++ \
          libgstreamer-gl1.0-0 libfuse2 libfontconfig1-dev libfreetype6-dev \
          libx11-dev libx11-xcb-dev libxext-dev libxfixes-dev libxi-dev \
          libxrender-dev libxcb1-dev libxcb-glx0-dev libxcb-keysyms1-dev \
          libxcb-image0-dev libxcb-shm0-dev libxcb-icccm4-dev \
          libxcb-sync-dev libxcb-xfixes0-dev libxcb-shape0-dev \
          libxcb-randr0-dev libxcb-render-util0-dev \
          libxkbcommon-dev libxkbcommon-x11-dev \
          fuse desktop-file-utils # For linuxdeployqt & AppImage
        
        # Install Sentry CLI
        curl -sL https://sentry.io/get-cli/ | bash
        echo "/root/.sentry-cli" >> $GITHUB_PATH

    - name: Install Qt (Linux in Docker)
      shell: bash
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install aqtinstall==3.2.*

        echo "Installing Qt ${{ matrix.qt }} for Linux..."
        QT_MODULES_ARG=""
        if [[ "${{ matrix.qt }}" == 6* ]]; then
          QT_MODULES_ARG="-m qtmultimedia qtimageformats"
        fi
        aqt install-qt linux desktop ${{ matrix.qt }} linux_x64 $QT_MODULES_ARG --outputdir /opt/Qt

        QT_BASE_DIR="/opt/Qt/${{ matrix.qt }}"
        if [[ -d "${QT_BASE_DIR}/gcc_64" ]]; then
            QT_INSTALL_DIR="${QT_BASE_DIR}/gcc_64"
        elif [[ -d "${QT_BASE_DIR}/gcc_x86-64" ]]; then
            QT_INSTALL_DIR="${QT_BASE_DIR}/gcc_x86-64"
        else
            echo "Error: Could not find Qt installation directory under ${QT_BASE_DIR}"
            exit 1
        fi
        
        echo "QTDIR=${QT_INSTALL_DIR}" >> $GITHUB_ENV
        echo "${QT_INSTALL_DIR}/bin" >> $GITHUB_PATH
        echo "Qt installed to ${QT_INSTALL_DIR}"

        # Configure ccache
        mkdir -p /github/workspace/.ccache
        echo "CCACHE_DIR=/github/workspace/.ccache" >> $GITHUB_ENV
        echo "/usr/lib/ccache" >> $GITHUB_PATH
        ccache -M 2G
        ccache -s

    - name: Cache ccache (Linux in Docker)
      uses: actions/cache@v4
      with:
        path: /github/workspace/.ccache
        key: ubuntu-20.04-docker-ccache-${{ matrix.qt }}-${{ github.sha }} # Updated key for 20.04
        restore-keys: |
          ubuntu-20.04-docker-ccache-${{ matrix.qt }}-

    # ... (Compile Sentry SDK, Build Ubuntu, Test, linuxdeployqt, Upload, Publish steps)
    # Ensure the AppImage name reflects Ubuntu 20.04 if you want to be precise:
    # mv wiRedPanda*.AppImage wiRedPanda-$VERSION-Ubuntu-20.04-Qt${{ matrix.qt }}.AppImage
    # in the linuxdeployqt step.

    - name: Compile Sentry SDK (Linux in Docker)
      shell: bash
      run: |
        git clone --recursive https://github.com/getsentry/sentry-native.git
        mkdir -p sentry-native/build
        cd sentry-native/build
        cmake .. -B . -D SENTRY_BACKEND=crashpad -D CMAKE_BUILD_TYPE=RelWithDebInfo
        cmake --build . --parallel
        cmake --install . --prefix /github/workspace/thirdparty/sentry
        cd /github/workspace

    - name: Build Ubuntu (Linux in Docker)
      shell: bash
      run: |
        mkdir build
        cd build
        qmake ../WPanda.pro CONFIG+=release
        make -j$(nproc)
        
        mkdir -p app/lib test/lib
        cp ../thirdparty/sentry/bin/crashpad_handler app/
        cp ../thirdparty/sentry/lib/libsentry.so app/lib/
        cp ../thirdparty/sentry/lib/libsentry.so test/lib/
        cd /github/workspace

    - name: Test Ubuntu (Linux in Docker)
      shell: bash
      run: |
        cd build/test
        ./WPanda-test -platform offscreen 
        cd /github/workspace

    - name: linuxdeployqt (Linux in Docker)
      shell: bash
      run: |
        mkdir -p appimage/lib 
        cp app/resources/wpanda.desktop appimage/wpanda.desktop
        cp app/resources/wpanda.svg appimage/wpanda_icon.svg
        cp build/app/wiredpanda appimage/
        cp thirdparty/sentry/lib/libsentry.so appimage/lib/
        
        wget -q https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
        chmod +x ./linuxdeployqt-continuous-x86_64.AppImage
        
        echo "Packaging AppImage with VERSION=${VERSION}"
        ./linuxdeployqt-continuous-x86_64.AppImage appimage/wiredpanda -appimage
        
        rm ./linuxdeployqt-continuous-x86_64.AppImage
        # Update AppImage name to reflect Ubuntu 20.04
        mv wiRedPanda*.AppImage wiRedPanda-$VERSION-Ubuntu-20.04-Qt${{ matrix.qt }}.AppImage

    - name: Upload Debug Symbols to Sentry (Linux)
      env:
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        SENTRY_ORG: ${{ secrets.SENTRY_ORG }} 
        SENTRY_PROJECT: wiredpanda 
      shell: bash
      run: |
        sentry-cli --version
        sentry-cli login --auth-token "$SENTRY_AUTH_TOKEN"
        sentry-cli releases new "wiredpanda@$VERSION" --org "$SENTRY_ORG" --project "$SENTRY_PROJECT"
        sentry-cli releases files "wiredpanda@$VERSION" upload-sourcemaps --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" --include-sources build/app/
        sentry-cli releases set-commits --auto "wiredpanda@$VERSION" --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" --log-level=debug

    - name: Publish Ubuntu Artifact
      uses: softprops/action-gh-release@v2
      with:
        fail_on_unmatched_files: true
        files: '*.AppImage' # This will now pick up the -Ubuntu-20.04- named AppImage